name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      # 1. Create a pristine, complete Flutter template in the cloud machine
      - name: Scaffold Fresh Flutter Project
        run: |
          cd ..
          flutter create --org com.razzexe --project-name=music_vault music_project
          
      # 2. Inject your custom configurations and premium code into the pristine project
      - name: Inject Custom App Code
        run: |
          cp pubspec.yaml ../music_project/pubspec.yaml
          cp lib/main.dart ../music_project/lib/main.dart
          cp ios/Runner/Info.plist ../music_project/ios/Runner/Info.plist
          
      # 3. Get dependencies inside the updated cloud project
      - name: Install Dependencies
        run: |
          cd ../music_project
          flutter pub get

      # 4. Update CocoaPods repositories inside the pristine iOS directory
      - name: Update Pods
        run: |
          cd ../music_project/ios
          pod repo update

      # 5. Build the non-codesigned iOS binaries cleanly
      - name: Build iOS Application
        run: |
          cd ../music_project
          flutter build ios --release --no-codesign

      # 6. Package everything into a proper .ipa installer payload
      - name: Package IPA
        run: |
          cd ../music_project/build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      # 7. Upload the final .ipa directly to your GitHub releases page
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ../music_project/build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "Premium Local Music Vault - Production Build v1.0"